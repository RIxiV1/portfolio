name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # npm install (not `npm ci`): the lockfile is generated on Windows and
      # omits Linux-only optional deps (sharp's @emnapi wasm fallback), which
      # makes `npm ci` fail on the Ubuntu runner. `npm install` resolves the
      # right platform binaries while still honouring the committed lockfile.
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
